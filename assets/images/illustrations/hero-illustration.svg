<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7E98E"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8A6914"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="g3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#6B4F0E"/>
    </linearGradient>
    <linearGradient id="g4" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#EDD063"/>
      <stop offset="100%" stop-color="#9A7B1E"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D680"/>
      <stop offset="100%" stop-color="#7A5C10"/>
    </linearGradient>
    <radialGradient id="ambientGlow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#D4AF37" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="sparkGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gemGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow behind gem -->
  <ellipse cx="250" cy="285" rx="185" ry="135" fill="url(#ambientGlow)"/>

  <!-- ── DIAMOND GEM (brilliant cut) ── -->

  <!-- Crown table (top flat face) -->
  <polygon points="210,158 290,158 318,208 182,208" fill="url(#g2)" opacity="0.96"/>

  <!-- Crown left bezel -->
  <polygon points="160,196 182,208 210,158 173,168" fill="#BF9B2F" opacity="0.88"/>
  <!-- Crown left corner -->
  <polygon points="152,218 160,196 182,208 174,228" fill="#A07820" opacity="0.80"/>
  <!-- Crown right bezel -->
  <polygon points="340,196 327,168 290,158 318,208" fill="#F0DC80" opacity="0.85"/>
  <!-- Crown right corner -->
  <polygon points="348,218 340,196 318,208 326,228" fill="#D4AF37" opacity="0.82"/>
  <!-- Girdle belt -->
  <polygon points="152,218 174,228 326,228 348,218 318,208 182,208" fill="#C9A227" opacity="0.45"/>

  <!-- Pavilion (lower half) -->
  <polygon points="152,218 174,228 250,383" fill="url(#g3)" opacity="0.90"/>
  <polygon points="174,228 250,292 250,383" fill="url(#g4)" opacity="0.88"/>
  <polygon points="326,228 250,292 250,383" fill="url(#g4)" opacity="0.85"/>
  <polygon points="348,218 326,228 250,383" fill="url(#g5)" opacity="0.90"/>

  <!-- Internal facet highlights -->
  <line x1="250" y1="292" x2="250" y2="383" stroke="#F2D680" stroke-width="0.8" opacity="0.38"/>
  <line x1="174" y1="228" x2="250" y2="292" stroke="#F2D680" stroke-width="0.5" opacity="0.22"/>
  <line x1="326" y1="228" x2="250" y2="292" stroke="#F2D680" stroke-width="0.5" opacity="0.22"/>
  <line x1="182" y1="208" x2="250" y2="158" stroke="#F7E98E" stroke-width="0.5" opacity="0.30"/>
  <line x1="318" y1="208" x2="250" y2="158" stroke="#F7E98E" stroke-width="0.5" opacity="0.30"/>

  <!-- Outer outline stroke -->
  <polygon points="160,196 173,168 250,140 327,168 340,196 348,218 250,383 152,218"
           fill="none" stroke="#F2D680" stroke-width="1.5" stroke-linejoin="round" opacity="0.55"/>
  <!-- Crown table outline -->
  <polygon points="210,158 290,158 318,208 182,208"
           fill="none" stroke="#F7E98E" stroke-width="0.8" opacity="0.45"/>

  <!-- Crown top point accent -->
  <line x1="250" y1="158" x2="250" y2="140" stroke="#F2D680" stroke-width="1.2" opacity="0.55"/>

  <!-- ── SPARKLES ── -->

  <!-- Main top sparkle (largest) -->
  <g filter="url(#sparkGlow)">
    <line x1="250" y1="102" x2="250" y2="126" stroke="#FFFDE7" stroke-width="2.5"/>
    <line x1="238" y1="114" x2="262" y2="114" stroke="#FFFDE7" stroke-width="2.5"/>
    <line x1="243" y1="107" x2="257" y2="121" stroke="#FFFDE7" stroke-width="1.5" opacity="0.65"/>
    <line x1="257" y1="107" x2="243" y2="121" stroke="#FFFDE7" stroke-width="1.5" opacity="0.65"/>
    <circle cx="250" cy="114" r="4" fill="white"/>
  </g>

  <!-- Upper-right sparkle -->
  <g filter="url(#sparkGlow)" opacity="0.72">
    <line x1="372" y1="128" x2="372" y2="144" stroke="#F2D680" stroke-width="2"/>
    <line x1="364" y1="136" x2="380" y2="136" stroke="#F2D680" stroke-width="2"/>
    <circle cx="372" cy="136" r="2.5" fill="#F7E98E"/>
  </g>

  <!-- Upper-left sparkle -->
  <g filter="url(#sparkGlow)" opacity="0.58">
    <line x1="132" y1="152" x2="132" y2="164" stroke="#F2D680" stroke-width="1.6"/>
    <line x1="126" y1="158" x2="138" y2="158" stroke="#F2D680" stroke-width="1.6"/>
    <circle cx="132" cy="158" r="2" fill="#F7E98E"/>
  </g>

  <!-- Lower-right tiny sparkle -->
  <g filter="url(#sparkGlow)" opacity="0.45">
    <line x1="394" y1="286" x2="394" y2="294" stroke="#D4AF37" stroke-width="1.3"/>
    <line x1="390" y1="290" x2="398" y2="290" stroke="#D4AF37" stroke-width="1.3"/>
    <circle cx="394" cy="290" r="1.6" fill="#F2D680"/>
  </g>

  <!-- Lower-left tiny sparkle -->
  <g filter="url(#sparkGlow)" opacity="0.38">
    <line x1="108" y1="275" x2="108" y2="283" stroke="#D4AF37" stroke-width="1.2"/>
    <line x1="104" y1="279" x2="112" y2="279" stroke="#D4AF37" stroke-width="1.2"/>
    <circle cx="108" cy="279" r="1.4" fill="#F2D680"/>
  </g>

  <!-- ── NETWORK NODES (consulting connectivity) ── -->

  <!-- Outer nodes -->
  <circle cx="68" cy="105" r="3.5" fill="#D4AF37" opacity="0.38"/>
  <circle cx="435" cy="132" r="3" fill="#D4AF37" opacity="0.34"/>
  <circle cx="52" cy="315" r="3" fill="#D4AF37" opacity="0.28"/>
  <circle cx="450" cy="278" r="3.5" fill="#D4AF37" opacity="0.33"/>
  <circle cx="140" cy="442" r="3" fill="#D4AF37" opacity="0.24"/>
  <circle cx="368" cy="434" r="3" fill="#D4AF37" opacity="0.26"/>
  <circle cx="418" cy="395" r="2.5" fill="#D4AF37" opacity="0.20"/>
  <circle cx="85" cy="392" r="2.5" fill="#D4AF37" opacity="0.20"/>

  <!-- Connection lines gem → outer nodes -->
  <line x1="160" y1="196" x2="68" y2="105" stroke="#D4AF37" stroke-width="0.6" opacity="0.16"/>
  <line x1="340" y1="196" x2="435" y2="132" stroke="#D4AF37" stroke-width="0.6" opacity="0.16"/>
  <line x1="152" y1="218" x2="52" y2="315" stroke="#D4AF37" stroke-width="0.6" opacity="0.13"/>
  <line x1="348" y1="218" x2="450" y2="278" stroke="#D4AF37" stroke-width="0.6" opacity="0.13"/>
  <line x1="218" y1="383" x2="140" y2="442" stroke="#D4AF37" stroke-width="0.5" opacity="0.12"/>
  <line x1="282" y1="383" x2="368" y2="434" stroke="#D4AF37" stroke-width="0.5" opacity="0.12"/>

  <!-- Inner satellite nodes -->
  <circle cx="105" cy="212" r="2" fill="#D4AF37" opacity="0.28"/>
  <circle cx="398" cy="228" r="2" fill="#D4AF37" opacity="0.26"/>
  <line x1="152" y1="218" x2="105" y2="212" stroke="#D4AF37" stroke-width="0.5" opacity="0.16"/>
  <line x1="348" y1="218" x2="398" y2="228" stroke="#D4AF37" stroke-width="0.5" opacity="0.16"/>

  <!-- ── DECORATIVE BASE ── -->
  <line x1="182" y1="418" x2="318" y2="418" stroke="#D4AF37" stroke-width="0.8" opacity="0.18"/>
  <circle cx="182" cy="418" r="2" fill="#D4AF37" opacity="0.18"/>
  <circle cx="318" cy="418" r="2" fill="#D4AF37" opacity="0.18"/>
</svg>
